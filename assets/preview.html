<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Harbor preview</title>
  <link rel="stylesheet" href="../sidepanel.css" />
  <style> html,body{width:380px;} </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="mark"></span><span class="brand-name">HARBOR</span></div>
      <div class="topbar-tools">
        <div class="filter-wrap"><input id="filter" class="filter" type="text" placeholder="絞り込み" /></div>
        <button id="densityToggle" class="icon-btn">⊟</button>
        <button id="helpToggle" class="icon-btn">?</button>
      </div>
    </header>
    <nav class="spaces" id="spaces"></nav>
    <main class="content">
      <section class="block block-pins" id="pinsBlock">
        <div class="rail-head"><span class="rail-label">PINS</span><span class="count" id="pinCount"></span></div>
        <div class="pins" id="pins"></div>
      </section>
      <section class="block block-anchored">
        <div class="block-head">
          <span class="tag tag-anchor">ANCHORED</span><span class="space-title" id="spaceTitle"></span>
          <span class="count" id="anchorCount"></span><span class="spacer"></span>
          <button id="spaceOpenAll" class="mini-btn">すべて開く</button>
        </div>
        <div class="anchored-scroll" id="anchoredScroll"></div>
      </section>
      <section class="block block-live">
        <div class="block-head">
          <span class="tag tag-live">LIVE</span><span class="count" id="liveCount"></span>
          <span class="spacer"></span><button id="tidyBtn" class="mini-btn">片付け</button>
        </div>
        <div class="tablist" id="liveList"></div>
      </section>
    </main>
    <footer class="footer"><span id="hint">クリックで開く · タブをグリッドへドラッグで係留 · 1–9 でスペース</span></footer>
  </div>
  <div class="group-pop hidden" id="groupPop"></div>
  <div class="snackbar hidden" id="snackbar"><span id="snackMsg"></span><button id="snackUndo" class="snack-undo">元に戻す</button></div>
  <div class="overlay hidden" id="overlay"><div class="modal"><h2 id="modalTitle"></h2>
    <label>名前<input id="fTitle"/></label><label>URL<input id="fUrl"/></label><label>スペース<select id="fSpace"></select></label>
    <div class="modal-actions"><button id="mDelete" class="btn btn-danger">削除</button><span class="spacer"></span>
    <button id="mCancel" class="btn">キャンセル</button><button id="mSave" class="btn btn-primary">保存</button></div></div></div>
  <div class="overlay hidden" id="spaceOverlay"><div class="modal"><h2 id="spaceModalTitle"></h2>
    <label>名前<input id="sName"/></label><label>色<div class="swatches" id="sSwatches"></div></label>
    <div class="modal-actions"><button id="sDelete" class="btn btn-danger">削除</button><span class="spacer"></span>
    <button id="sCancel" class="btn">キャンセル</button><button id="sSave" class="btn btn-primary">保存</button></div></div></div>

  <script>
  /* ---- offline dummy favicons (no network; for previews & screenshots) ---- */
  const BRAND = {
    "github.com":["#3a3f46","#24292e","G"], "docs.github.com":["#3a3f46","#24292e","G"],
    "console.aws.amazon.com":["#ff9900","#ec7211","a"], "amazon.com":["#ff9900","#ec7211","a"],
    "console.cloud.google.com":["#4285f4","#1a73e8","G"], "google.com":["#4285f4","#1a73e8","G"],
    "dash.cloudflare.com":["#f6821f","#faad3f","C"], "cloudflare.com":["#f6821f","#faad3f","C"],
    "app.datadoghq.com":["#774aa4","#632ca6","D"], "grafana.com":["#f46800","#e87a00","G"],
    "jira.atlassian.com":["#2684ff","#0052cc","J"], "atlassian.com":["#2684ff","#0052cc","J"],
    "developer.mozilla.org":["#4d4dff","#1b1b1b","M"], "developer.chrome.com":["#4285f4","#34a853","C"],
    "stackoverflow.com":["#f7a04c","#f48024","S"], "mail.google.com":["#ea4335","#c5221f","M"],
    "calendar.google.com":["#4285f4","#1a73e8","C"], "figma.com":["#a259ff","#f24e1e","F"],
  };
  function hostOf(u){ try{ return new URL(u).hostname.replace(/^www\./,""); }catch{ return (u||"").replace(/^www\./,""); } }
  function favData(host){
    host = (host||"").replace(/^www\./,"");
    let c1,c2,ltr;
    if (BRAND[host]) { [c1,c2,ltr] = BRAND[host]; }
    else {
      let h=0; for (const ch of host) h=(h*31+ch.charCodeAt(0))>>>0;
      const hue=h%360; c1=`hsl(${hue} 58% 54%)`; c2=`hsl(${(hue+26)%360} 62% 42%)`;
      ltr=(host.replace(/^[^a-z0-9]*/i,"")[0]||"•").toUpperCase();
    }
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'>`
      + `<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>`
      + `<stop offset='0' stop-color='${c1}'/><stop offset='1' stop-color='${c2}'/></linearGradient></defs>`
      + `<rect width='64' height='64' rx='15' fill='url(#g)'/>`
      + `<text x='32' y='45' font-family='-apple-system,Segoe UI,Roboto,sans-serif' font-size='36' font-weight='700' fill='#fff' fill-opacity='.95' text-anchor='middle'>${ltr}</text>`
      + `</svg>`;
    return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
  }
  /* derive a host from whatever favicon URL sidepanel.js generated, then swap to a data URI */
  function hostFromFavSrc(src){
    if (!src || src.startsWith("data:")) return null;
    try { const u=new URL(src, location.href);
      const pg=u.searchParams.get("pageUrl"); if (pg) return hostOf(pg);
      const dm=u.searchParams.get("domain");  if (dm) return dm.replace(/^www\./,"");
    } catch {}
    return null;
  }
  function fixFav(img){
    if (img.dataset.dummy) return;
    const host = hostFromFavSrc(img.getAttribute("src"));
    if (host){ img.dataset.dummy="1"; img.src = favData(host); }
  }
  const FAV = (d) => favData(d);   // LIVE tabs use this directly
  /* rewrite bookmark/tab favicons as they are added, plus an error-time fallback */
  new MutationObserver(muts=>{
    for (const m of muts) for (const node of m.addedNodes){
      if (node.nodeType!==1) continue;
      if (node.tagName==="IMG" && /fav/.test(node.className)) fixFav(node);
      node.querySelectorAll && node.querySelectorAll("img.fav,img.pin-fav").forEach(fixFav);
    }
  }).observe(document.documentElement,{childList:true,subtree:true});
  document.addEventListener("error", e=>{ const t=e.target;
    if (t && t.tagName==="IMG" && /fav/.test(t.className)) fixFav(t);
  }, true);

  /* ---- in-memory bookmark tree + chrome.* mock ---- */
  const nodes = {};
  function n(o){ nodes[o.id]=Object.assign({children:[]},o); return o.id; }
  n({id:"0",children:["1","2"]});
  n({id:"1",parentId:"0",index:0,folderType:"bookmarks-bar",title:"ブックマーク バー",
     children:["p1","p2","p3","f1","f2"]});
  n({id:"2",parentId:"0",index:1,title:"その他",children:[]});
  // loose pins
  n({id:"p1",parentId:"1",index:0,title:"GitHub",url:"https://github.com"});
  n({id:"p2",parentId:"1",index:1,title:"Gmail",url:"https://mail.google.com"});
  n({id:"p3",parentId:"1",index:2,title:"Calendar",url:"https://calendar.google.com"});
  // space folders
  n({id:"f1",parentId:"1",index:3,title:"クラウド",children:["a1","a2","a3","s1"]});
  n({id:"a1",parentId:"f1",index:0,title:"AWS Console",url:"https://console.aws.amazon.com"});
  n({id:"a2",parentId:"f1",index:1,title:"Google Cloud",url:"https://console.cloud.google.com"});
  n({id:"a3",parentId:"f1",index:2,title:"Cloudflare",url:"https://dash.cloudflare.com"});
  n({id:"s1",parentId:"f1",index:3,title:"監視",children:["m1","m2"]});
  n({id:"m1",parentId:"s1",index:0,title:"Datadog",url:"https://app.datadoghq.com"});
  n({id:"m2",parentId:"s1",index:1,title:"Grafana",url:"https://grafana.com"});
  n({id:"f2",parentId:"1",index:4,title:"開発",children:["b1","b2"]});
  n({id:"b1",parentId:"f2",index:0,title:"GitHub Docs",url:"https://docs.github.com"});
  n({id:"b2",parentId:"f2",index:1,title:"Jira",url:"https://jira.atlassian.com"});

  const sub = (id)=>{ const x=nodes[id]; return Object.assign({},x,{children:(x.children||[]).map(sub)}); };
  const kids = (id)=> (nodes[id].children||[]).map(c=>nodes[c]).sort((a,b)=>a.index-b.index);

  const tabs = [
    {id:1,index:0,title:"Harbor — GitHub",url:"https://github.com/nemototea/harbor",favIconUrl:FAV("github.com"),active:true,groupId:-1},
    {id:2,index:1,title:"AWS Console",url:"https://console.aws.amazon.com",favIconUrl:FAV("amazon.com"),groupId:-1},
    {id:3,index:2,title:"Stack Overflow",url:"https://stackoverflow.com/q/123",favIconUrl:FAV("stackoverflow.com"),groupId:100,splitViewId:7},
    {id:4,index:3,title:"MDN — Bookmarks API",url:"https://developer.mozilla.org",favIconUrl:FAV("mozilla.org"),groupId:100,splitViewId:7},
    {id:5,index:4,title:"chrome.tabGroups | Chrome",url:"https://developer.chrome.com/docs",favIconUrl:FAV("chrome.com"),groupId:100},
    {id:6,index:5,title:"Gmail — 受信トレイ",url:"https://mail.google.com",favIconUrl:FAV("google.com"),groupId:-1},
    {id:7,index:6,title:"Figma — Harbor UI",url:"https://figma.com/file/x",favIconUrl:FAV("figma.com"),groupId:-1},
  ];
  const groups = [{id:100,title:"調査",color:"blue",collapsed:false,windowId:1}];
  const noop=()=>{}; const L={addListener:noop};
  window.chrome = {
    runtime:{ getURL:(p)=>"https://www.google.com"+p },
    storage:{ local:{ get:async()=>({}), set:async()=>{} } },
    windows:{ getCurrent:async()=>({id:1}), update:async()=>{} },
    bookmarks:{
      getTree:async()=>[sub("0")], getChildren:async(id)=>kids(id), getSubTree:async(id)=>[sub(id)],
      get:async(id)=>[nodes[id]], create:async()=>({id:"new"}), move:async()=>{}, remove:async()=>{},
      removeTree:async()=>{}, update:async()=>{},
      onCreated:L,onRemoved:L,onChanged:L,onMoved:L,onChildrenReordered:L,onImportEnded:L,
    },
    tabs:{
      query:async()=> tabs.map(t=>Object.assign({windowId:1},t)),
      update:async()=>{}, create:async()=>({id:99}), remove:async()=>{}, group:async()=>100, ungroup:async()=>{},
      TAB_GROUP_ID_NONE:-1, SPLIT_VIEW_ID_NONE:-1,
      onCreated:L,onRemoved:L,onUpdated:L,onActivated:L,onMoved:L,onAttached:L,onDetached:L,
    },
    tabGroups:{ query:async()=>groups.slice(), update:async()=>{}, onCreated:L,onUpdated:L,onRemoved:L,onMoved:L },
  };
  </script>
  <script src="../sidepanel.js"></script>
</body>
</html>
