<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harbor</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <span class="brand-name">HARBOR</span>
      </div>
      <div class="topbar-tools">
        <div class="filter-wrap">
          <input id="filter" class="filter" type="text" placeholder="絞り込み" autocomplete="off" spellcheck="false" aria-label="錨を絞り込み" />
        </div>
        <button id="densityToggle" class="icon-btn" title="表示密度を切り替え" aria-label="表示密度">⊟</button>
        <button id="helpToggle" class="icon-btn" title="使い方を見る" aria-label="使い方を見る">?</button>
        <button id="editToggle" class="icon-btn" title="編集モード">編集</button>
      </div>
    </header>

    <nav class="spaces" id="spaces" aria-label="スペース"></nav>

    <main class="content">
      <!-- pinned bar bookmarks (loose, always visible) -->
      <section class="block block-pins" id="pinsBlock">
        <div class="rail-head">
          <span class="rail-label">PINS</span>
          <span class="count" id="pinCount"></span>
        </div>
        <div class="pins" id="pins"></div>
      </section>

      <section class="block block-anchored">
        <div class="block-head">
          <span class="tag tag-anchor">ANCHORED</span>
          <span class="space-title" id="spaceTitle"></span>
          <span class="count" id="anchorCount"></span>
          <span class="spacer"></span>
          <button id="spaceOpenAll" class="mini-btn" title="このスペースの錨をすべて開く">すべて開く</button>
        </div>
        <div class="anchored-scroll" id="anchoredScroll"></div>
      </section>

      <section class="block block-live">
        <div class="block-head">
          <span class="tag tag-live">LIVE</span>
          <span class="count" id="liveCount"></span>
          <span class="spacer"></span>
          <button id="tidyBtn" class="mini-btn" title="どこにも保存していないタブを閉じる">片付け</button>
        </div>
        <div class="tablist" id="liveList"></div>
      </section>
    </main>

    <footer class="footer">
      <span id="hint">クリックで開く · タブをグリッドへドラッグで係留 · グループヘッダへドラッグで仲間入り · 1–9 でスペース</span>
    </footer>
  </div>

  <!-- group color popover -->
  <div class="group-pop hidden" id="groupPop"></div>

  <!-- undo snackbar -->
  <div class="snackbar hidden" id="snackbar">
    <span id="snackMsg"></span>
    <button id="snackUndo" class="snack-undo">元に戻す</button>
  </div>

  <!-- edit / add anchor modal -->
  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">錨を編集</h2>
      <label>名前<input type="text" id="fTitle" autocomplete="off" /></label>
      <label>URL<input type="text" id="fUrl" autocomplete="off" spellcheck="false" /></label>
      <label>スペース<select id="fSpace"></select></label>
      <div class="modal-actions">
        <button id="mDelete" class="btn btn-danger">削除</button>
        <span class="spacer"></span>
        <button id="mCancel" class="btn">キャンセル</button>
        <button id="mSave" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- space modal -->
  <div class="overlay hidden" id="spaceOverlay">
    <div class="modal">
      <h2 id="spaceModalTitle">スペース</h2>
      <label>名前<input type="text" id="sName" autocomplete="off" /></label>
      <label>色
        <div class="swatches" id="sSwatches"></div>
      </label>
      <div class="modal-actions">
        <button id="sDelete" class="btn btn-danger">削除</button>
        <span class="spacer"></span>
        <button id="sCancel" class="btn">キャンセル</button>
        <button id="sSave" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- first-run guided tour -->
  <div class="tour hidden" id="tour" aria-live="polite">
    <div class="tour-spot" id="tourSpot" aria-hidden="true"></div>
    <div class="tour-card" id="tourCard" role="dialog" aria-modal="true" aria-labelledby="tourTitle">
      <span class="tour-key" id="tourKey"></span>
      <h3 class="tour-title" id="tourTitle"></h3>
      <p class="tour-body" id="tourBody"></p>
      <div class="tour-foot">
        <button class="tour-skip" id="tourSkip">スキップ</button>
        <span class="tour-dots" id="tourDots" aria-hidden="true"></span>
        <button class="tour-nav tour-back" id="tourBack">戻る</button>
        <button class="tour-nav tour-next" id="tourNext">次へ</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
