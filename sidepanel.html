<html lang="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harbor</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="mark" aria-hidden="true"></span>
        <span class="brand-name">HARBOR</span>
      </div>
      <div class="topbar-tools">
        <div class="filter-wrap">
          <input id="filter" class="filter" type="text" placeholder="" autocomplete="off" spellcheck="false"
            data-i18n-placeholder="filterPlaceholder"
            data-i18n-aria-label="filterAriaLabel" />
        </div>
        <button id="densityToggle" class="icon-btn"
          data-i18n-title="densityToggleTitle"
          data-i18n-aria-label="densityToggleAriaLabel">⊟</button>
        <button id="helpToggle" class="icon-btn"
          data-i18n-title="helpToggleTitle"
          data-i18n-aria-label="helpToggleTitle">?</button>
      </div>
    </header>

    <nav class="spaces" id="spaces" data-i18n-aria-label="spacesAriaLabel"></nav>

    <main class="content">
      <!-- pinned bar bookmarks (loose, always visible) -->
      <section class="block block-pins" id="pinsBlock">
        <div class="rail-head">
          <span class="rail-label">PINS</span>
          <span class="count" id="pinCount"></span>
        </div>
        <div class="pins" id="pins"></div>
      </section>

      <section class="block block-anchored">
        <div class="block-head">
          <span class="tag tag-anchor">ANCHORED</span>
          <span class="space-title" id="spaceTitle"></span>
          <span class="count" id="anchorCount"></span>
          <span class="spacer"></span>
          <button id="spaceOpenAll" class="mini-btn"
            data-i18n="openAllLabel"
            data-i18n-title="openAllTitle"></button>
        </div>
        <div class="anchored-scroll" id="anchoredScroll"></div>
      </section>

      <section class="block block-live">
        <div class="block-head">
          <span class="tag tag-live">LIVE</span>
          <span class="count" id="liveCount"></span>
          <span class="spacer"></span>
          <button id="tidyBtn" class="mini-btn"
            data-i18n="tidyBtnLabel"
            data-i18n-title="tidyBtnTitle"></button>
        </div>
        <div class="tablist" id="liveList"></div>
      </section>
    </main>

    <footer class="footer">
      <span id="hint" data-i18n="footerHint"></span>
    </footer>
  </div>

  <!-- group color popover -->
  <div class="group-pop hidden" id="groupPop"></div>

  <!-- shared overflow / right-click menu (spaces · groups · anchors · pins) -->
  <div class="item-menu hidden" id="itemMenu" role="menu"></div>

  <!-- undo snackbar -->
  <div class="snackbar hidden" id="snackbar">
    <span id="snackMsg"></span>
    <button id="snackUndo" class="snack-undo" data-i18n="undoLabel"></button>
  </div>

  <!-- edit / add anchor modal -->
  <div class="overlay hidden" id="overlay">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <label><span data-i18n="nameLabel"></span><input type="text" id="fTitle" autocomplete="off" /></label>
      <label><span data-i18n="urlLabel"></span><input type="text" id="fUrl" autocomplete="off" spellcheck="false" /></label>
      <label><span data-i18n="spaceSelectLabel"></span><select id="fSpace"></select></label>
      <div class="modal-actions">
        <button id="mDelete" class="btn btn-danger" data-i18n="deleteLabel"></button>
        <span class="spacer"></span>
        <button id="mCancel" class="btn" data-i18n="cancelLabel"></button>
        <button id="mSave" class="btn btn-primary" data-i18n="saveLabel"></button>
      </div>
    </div>
  </div>

  <!-- space modal -->
  <div class="overlay hidden" id="spaceOverlay">
    <div class="modal">
      <h2 id="spaceModalTitle"></h2>
      <label><span data-i18n="nameLabel"></span><input type="text" id="sName" autocomplete="off" /></label>
      <label><span data-i18n="colorLabel"></span>
        <div class="swatches" id="sSwatches"></div>
      </label>
      <div class="modal-actions">
        <button id="sDelete" class="btn btn-danger" data-i18n="deleteLabel"></button>
        <span class="spacer"></span>
        <button id="sCancel" class="btn" data-i18n="cancelLabel"></button>
        <button id="sSave" class="btn btn-primary" data-i18n="saveLabel"></button>
      </div>
    </div>
  </div>

  <!-- in-app confirm / prompt dialog -->
  <div class="overlay hidden" id="dialogOverlay">
    <div class="modal modal-dialog">
      <h2 id="dlgTitle"></h2>
      <p id="dlgMsg" class="dlg-msg"></p>
      <label id="dlgInputWrap" class="hidden"><input type="text" id="dlgInput" autocomplete="off" /></label>
      <div class="modal-actions">
        <span class="spacer"></span>
        <button id="dlgCancel" class="btn" data-i18n="cancelLabel"></button>
        <button id="dlgOk" class="btn btn-primary" data-i18n="okLabel"></button>
      </div>
    </div>
  </div>

  <!-- first-run guided tour -->
  <div class="tour hidden" id="tour" aria-live="polite">
    <div class="tour-spot" id="tourSpot" aria-hidden="true"></div>
    <div class="tour-card" id="tourCard" role="dialog" aria-modal="true" aria-labelledby="tourTitle">
      <span class="tour-key" id="tourKey"></span>
      <h3 class="tour-title" id="tourTitle"></h3>
      <p class="tour-body" id="tourBody"></p>
      <div class="tour-foot">
        <button class="tour-skip" id="tourSkip" data-i18n="tourSkipLabel"></button>
        <span class="tour-dots" id="tourDots" aria-hidden="true"></span>
        <button class="tour-nav tour-back" id="tourBack" data-i18n="tourBackLabel"></button>
        <button class="tour-nav tour-next" id="tourNext" data-i18n="tourNextLabel"></button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
